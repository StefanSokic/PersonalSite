<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="outer" id="grid"></div>
  <div class="footer">стефан сокић</div>
  <script>
    const masks = ['one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight'];

    function fillGrid() {
      const CELL = window.innerWidth >= 768 ? 75 : 60;
      const grid = document.getElementById('grid');
      const footer = document.querySelector('.footer');
      const cols = Math.floor(window.innerWidth / CELL);
      const rows = Math.floor((window.innerHeight - footer.offsetHeight) / CELL);
      const total = cols * rows;

      grid.style.gridTemplateColumns = `repeat(${cols}, ${CELL}px)`;

      const fragment = document.createDocumentFragment();
      for (let i = 0; i < total; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const mask = masks[(row + col) % masks.length];

        const spinner = document.createElement('div');
        spinner.className = 'spinner';
        spinner.innerHTML = `<div class="outer-circle"><div class="inner-mask ${mask}"></div></div>`;
        fragment.appendChild(spinner);
      }

      grid.replaceChildren(fragment);
    }

    fillGrid();
    window.addEventListener('resize', fillGrid);
  </script>
</body>
</html>
